  <style type="text/css">
    /* ============================================== 
       ORIGINAL: Animated Background 
    ============================================== */
    body {
        background: linear-gradient(-45deg, #ffd1ff, #fad0c4, #a1c4fd, #c2e9fb);
        /* background: linear-gradient(-45deg, #323132, #61504a, #21262d, #35354b); */
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        font-family: 'Lato', sans-serif;
        overflow-x: hidden;
        transition: background 1.5s ease; /* Smooth transition to night */
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* ============================================== 
       NEW: Magical Night Override for Flipbook Phase
    ============================================== */
    body.magical-night {
        background: radial-gradient(circle at center, #2b1044 0%, #0a0410 100%) !important;
        animation: none !important;
    }
    body.locked-screen {
        overflow: hidden !important;
        height: 100vh !important;
    }

    /* ============================================== 
       ORIGINAL: Modern Floating Buttons 
    ============================================== */
    .navbar {
        background: transparent !important;
        border: none !important;
        padding-bottom: 20px;
    }
    
    .navbar .btn {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(5px);
        color: #ff6b81;
        border: 2px solid #ff6b81;
        border-radius: 50px;
        padding: 10px 20px;
        margin: 5px;
        font-weight: bold;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .navbar .btn:hover {
        transform: translateY(-5px) scale(1.05);
        box-shadow: 0 10px 25px rgba(255, 107, 129, 0.4);
        background-color: #ff6b81;
        color: white;
    }

    /* ============================================== POSITION */
    .cake {
      position: absolute;
      display: none;
      left: 50%;
      margin-left: -150px;
      width: 300px;
      height: 300px;
    }
    /* ============================================== BASE */
    .cake:after {
      background: #ffffff;
      border-radius: 300px;
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 300px;
      height: 6px;
    }
    /* ============================================== Candle */
    .velas {
      background: #ffffff;
      border-radius: 100%;
      position: absolute;
      top: 50%;
      left: 50%;
      margin-left: -7.5px;
      margin-top: -25px;
      width: 15px;
      height: 50px;
    }
    .velas:after,
    .velas:before {
      background: rgba(255, 0, 0, 0.4);
      content: "";
      position: absolute;
      width: 100%;
      height: 6.66666667px;
    }
    .velas:after { top: 25%; left: 0; }
    .velas:before { top: 45%; left: 0; }
    
    /* ============================================== Fire */
    .fuego {
      display: none;
      border-radius: 100%;
      box-shadow: 0 0 40px 10px rgba(248, 233, 209, 0.2);
      position: absolute;
      top: -12px;
      left: 50%;
      margin-left: -10px;
      width: 20px;
      height: 37.5px;
    }
    .fuego:nth-child(1) { animation: fuego 2s infinite; }
    .fuego:nth-child(2) { animation: fuego 1.5s infinite; }
    .fuego:nth-child(3) { animation: fuego 1s infinite; }
    .fuego:nth-child(4) { animation: fuego 0.5s infinite; }
    .fuego:nth-child(5) { animation: fuego 0.2s infinite; }
    
    @keyframes fuego {
      0% { background: rgba(254, 248, 97, 0.5); transform: translateY(0) scale(1); }
      50% { background: rgba(255, 50, 0, 0.1); transform: translateY(-60px) scale(0); }
      100% { background: rgba(254, 248, 97, 0.5); transform: translateY(0) scale(1); }
    }
    
    /* ============================================== Frosting */
    .cobertura {
      background: #ece7e3;
      border-radius: 150px;
      position: absolute;
      top: 60%;
      left: 50%;
      margin-left: -83.33333333px;
      margin-top: -15px;
      width: 166.66666667px;
      height: 37.5px;
      z-index: 10;
    }
    .cobertura:after,
    .cobertura:before {
      background: #ece7e3;
      border-radius: 300px;
      content: "";
      position: absolute;
      width: 15px;
      height: 30px;
    }
    .cobertura:after { top: 20px; right: 42.85714286px; }
    .cobertura:before { top: 30px; right: 27.27272727px; }
    
    /* ============================================== BIZCOCHO */
    .bizcocho {
      background: #6d3826;
      position: absolute;
      bottom: 0;
      left: 50%;
      margin-left: -75px;
      width: 150px;
      height: 100px;
    }
    .bizcocho:after,
    .bizcocho:before {
      background: rgba(236, 231, 227, 0.6);
      content: "";
      position: absolute;
      width: 100%;
      height: 15px;
    }
    .bizcocho:after { top: 30%; left: 0; }
    .bizcocho:before { top: 60%; left: 0; }

    /* ============================================== Album */
    .album-photo {
      display: none;
      position: absolute;
      width: 300px; 
      height: auto;
      border: 8px solid white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      border-radius: 5px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
    }

    .album-photo:hover {
      transform: scale(1.1) rotate(0deg) !important;
      box-shadow: 0 15px 30px rgba(0,0,0,0.4);
      z-index: 20;
    }

    .album-left-1 { top: 50px; left: 50px; transform: rotate(-8deg); }
    .album-left-2 { top: 250px; left: 70px; transform: rotate(6deg); }
    .album-right-1 { top: 50px; right: 50px; transform: rotate(8deg); }
    .album-right-2 { top: 250px; right: 70px; transform: rotate(-6deg); }

    /* ============================================== TEXT */
    h1, p {
      font-family: 'Lato', sans-serif;
      font-weight: 400;
      font-style: italic;
      text-align: center;
      width: 100%;
      user-select: none;
      color: #333;
      text-shadow: 1px 1px 3px rgba(255,255,255,0.8);
    }
    
    p { font-size: 1.5em; }

    .profile-img {
      position: absolute; 
      bottom: 30px;  
      right: -170px;  
      width: 150px;
      height: 150px;
      border: 5px solid white;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      border-radius: 50%;
      transition: transform 0.3s ease;
    }
    .profile-img:hover {
      transform: scale(1.1);
    }

    /* ============================================== 
       NEW: FLIPBOOK CSS ADDED SAFELY 
    ============================================== */
    .bday-banner-finale {
        position: fixed; top: 7%; left: 50%; transform: translateX(-50%);
        font-family: 'Fredoka One', cursive; font-size: 50px; text-align: center; width: 100%;
        color: #ffd700; text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493;
        z-index: 9999 !important; opacity: 1; transition: top 1s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 1s;
        animation: floatBanner 3s ease-in-out infinite; pointer-events: none;
    }
    .bday-banner-finale.hide { top: -20%; opacity: 0; }
    @keyframes floatBanner { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-15px); } }

    .book-container {
        position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%) scale(1);
        perspective: 2000px; z-index: 9000; opacity: 1; transition: opacity 1s ease, transform 1s ease;
    }
    .book-container.hide { opacity: 0 !important; transform: translate(-50%, -40%) scale(0.8) !important; pointer-events: none; display: none; }
    .book-container::before {
        content: ''; position: absolute; top: -50px; left: -50px; right: -50px; bottom: -50px;
        background: radial-gradient(circle, rgba(255, 192, 203, 0.2) 0%, transparent 70%);
        z-index: -1; filter: blur(20px); animation: glowPulse 3s ease-in-out infinite;
    }
    @keyframes glowPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

    .book { width: 600px; height: 400px; position: relative; transform-style: preserve-3d; cursor: grab; user-select: none; }
    
    .page {
        width: 300px; height: 400px; position: absolute; top: 0; right: 0;
        transform-origin: left center; transform-style: preserve-3d;
        transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.8), 0 10px 20px rgba(0, 0, 0, 0.2);
        cursor: pointer; z-index: var(--page-z-index, 1);
    }
    .page-front, .page-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border: 2px solid #ffb6c1; background: #fff; }
    .page-front { z-index: 2; border-radius: 0 8px 8px 0; }
    .page-back { transform: rotateY(180deg); border-radius: 8px 0 0 8px; }
    .page-front img, .page-back img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; pointer-events: none; }
    .page-front::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(0,0,0,0.1) 0%, transparent 10%); }
    .page-back::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 90%, rgba(0,0,0,0.1) 100%); }
    
    .page.flipped { transform: rotateY(-180deg); z-index: var(--page-flipped-z-index, 1); }
    .page.flipping { transform: rotateY(-90deg); }
    .empty-page { display: flex; align-items: center; justify-content: center; color: #ffb6c1; font-size: 18px; font-family: 'Dancing Script', cursive; }

    .content-display {
        position: fixed; bottom: 5%; left: 50%; transform: translateX(-50%);
        width: 85vw; max-width: 650px; min-height: 100px; display: flex; align-items: center; justify-content: center;
        background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 20px 35px;
        box-shadow: 0 15px 40px rgba(255, 105, 180, 0.2); border: 2px solid #ffc0cb;
        z-index: 9500; transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .content-display.hide { opacity: 0; transform: translateX(-50%) translateY(30px); pointer-events: none; }
    .content-display p { margin: 0; color: #d81b60; font-size: 26px; line-height: 1.5; text-align: center; font-family: 'Dancing Script', cursive; font-weight: 700; }

    .magic-photo {
        position: fixed; width: 110px; height: 110px; border-radius: 15px; object-fit: cover;
        box-shadow: 0 5px 15px rgba(255, 105, 180, 0.5); opacity: 0; border: 4px solid white;
        z-index: 9600; transition: transform 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 1.5s ease;
        transform: translate(-50%, -50%) scale(0); cursor: pointer;
    }
    .magic-photo.formed { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s; }
    .magic-photo.formed:hover { transform: translate(-50%, -50%) scale(1.5) rotate(0deg) !important; box-shadow: 0 10px 30px rgba(255, 215, 0, 0.8); z-index: 9700; }

    .css-confetti { position: fixed; top: -10px; z-index: 9999; border-radius: 2px; animation: fall linear forwards; pointer-events: none; }
    @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }

    @media screen and (max-width: 768px) {
        .book { width: 300px; height: 200px; transform: scale(0.85); }
        .page { width: 150px; height: 200px; }
        .bday-banner-finale { font-size: 30px; top: 5%; }
        .content-display { min-height: 60px; padding: 10px; bottom: 2%; }
        .content-display p { font-size: 18px; }
        .magic-photo { width: 60px; height: 60px; }
    }


    .particle {
        position: fixed;
        pointer-events: none;
        z-index: 1;
        animation: floatUp linear infinite;
    }

    @keyframes floatUp {
        0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
        100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* Button "Wiggle" to invite clicks */
    .navbar .btn {
        animation: subtleWiggle 3s ease-in-out infinite;
    }

    @keyframes subtleWiggle {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(1deg); }
        75% { transform: rotate(-1deg); }
    }

    /* Pulsing Bulbs */
    .bulb {
        animation: pulseLight 2s infinite alternate;
    }

    @keyframes pulseLight {
        from { filter: brightness(1); }
        to { filter: brightness(1.3) contrast(1.2); }
    }

    /* Magical Star Trail */
    .star-trail {
        position: fixed;
        pointer-events: none;
        color: #ffd700;
        font-size: 20px;
        z-index: 10000;
        animation: fadeOutStar 0.8s forwards;
    }

    @keyframes fadeOutStar {
        from { opacity: 1; transform: scale(1); }
        to { opacity: 0; transform: scale(0.5) translateY(20px); }
    }


  </style>
</head>

<script>

let cakeClicks = 0;
$('.cake').on('click', function() {
    cakeClicks++;
    if (cakeClicks === 5) {
        playSound('pop'); // Using your existing sound helper
        $('#secret-egg').fadeIn();
        cakeClicks = 0; // Reset
    }
});



let inputBuffer = "";
const secretCode = "RAD";

$(document).on('keydown', function(e) {
    inputBuffer += e.key.toUpperCase();
    
    // Keep only the last N characters where N is the length of the secretCode
    if (inputBuffer.length > secretCode.length) {
        inputBuffer = inputBuffer.substring(inputBuffer.length - secretCode.length);
    }

        osc.start();
        osc.stop(ctx.currentTime + 0.1);

      $('#story').click(function(e) {

  const pagesConfig = [
      { image: 'assets/images/flipbook/cover.jpg', content: '' }, 
      { image: 'assets/images/flipbook/photo1.jpg', content: '' },
      { image: 'assets/images/flipbook/photo2.jpg', content: 'Dear Marj, you bring so much joy and happiness! 💕 Your smile lights up every room you enter! ✨' },
      { image: 'assets/images/flipbook/photo3.jpg', content: '' }, 
      { image: 'assets/images/flipbook/photo4.jpg', content: 'Sana maging masaya at magaan ang taon mo — nandito lang ako palagi. 🤍' }, 
      { image: 'assets/images/flipbook/photo5.jpg', content: '' }, 
      { image: 'assets/images/flipbook/photo6.jpg', content: 'They say nothing is perfect, but whenever I look at you, Marj, I realize they’re completely wrong. 🥰' }, 
      { image: 'assets/images/flipbook/photo7.jpg', content: '' }, 
      { image: 'assets/images/flipbook/photo8.jpg', content: 'Love you so much! Have the best day! ❤️🎂' }, 
      { image: 'assets/images/flipbook/9.jpg', content: '' } 
  ];

  const photoUrls = pagesConfig.filter(p => p.image && p.image !== '').map(p => p.image);

  let currentPage = 0; let isFlipping = false; let isHeartFormed = false; let typewriterTimeout;

  const bookContainer = document.getElementById('bookContainer');
  const book = document.getElementById('book');
  const contentDisplay = document.getElementById('contentDisplay');
  const contentText = document.getElementById('contentText');
  const bdayBannerFinale = document.getElementById('bdayBannerFinale');

  function createPages() {
      book.innerHTML = '';
      const totalPhysicalPages = Math.ceil(pagesConfig.length / 2);

      for (let i = 0; i < totalPhysicalPages; i++) {
          const page = document.createElement('div');
          page.classList.add('page'); page.dataset.page = i;

          const frontIdx = i * 2; const backIdx = frontIdx + 1;

          const front = document.createElement('div'); front.classList.add('page-front');
          if (frontIdx < pagesConfig.length && pagesConfig[frontIdx].image) {
              const img = document.createElement('img'); img.src = pagesConfig[frontIdx].image; front.appendChild(img);
          } else { front.classList.add('empty-page'); front.textContent = "Empty"; }

          const back = document.createElement('div'); back.classList.add('page-back');
          if (backIdx < pagesConfig.length && pagesConfig[backIdx].image) {
              const img = document.createElement('img'); img.src = pagesConfig[backIdx].image; back.appendChild(img);
          } else { back.classList.add('empty-page'); back.textContent = "The End"; }

          page.appendChild(front); page.appendChild(back); book.appendChild(page);

          page.addEventListener('click', (e) => {
              if (isFlipping) return;
              const rect = page.getBoundingClientRect();
              if (e.clientX - rect.left < rect.width / 2 && page.classList.contains('flipped')) prevPage();
              else if (e.clientX - rect.left >= rect.width / 2 && !page.classList.contains('flipped')) nextPage();
          });
      }
      calculatePageZIndexes(); showPageContent(); 
  }

  function calculatePageZIndexes() {
      const pages = book.querySelectorAll('.page');
      pages.forEach((page, i) => {
          page.style.setProperty('--page-z-index', (pages.length - i).toString());
          page.style.setProperty('--page-flipped-z-index', (i + 1).toString());
      });
  }

  function nextPage() {
      const totalPhysicalPages = Math.ceil(pagesConfig.length / 2);
      if (currentPage < totalPhysicalPages && !isFlipping) {
          isFlipping = true;
          const pageToFlip = document.querySelector(`.page[data-page="${currentPage}"]`);
          if (pageToFlip) {
              pageToFlip.classList.add('flipping');
              setTimeout(() => {
                  pageToFlip.classList.remove('flipping'); pageToFlip.classList.add('flipped');
                  currentPage++; isFlipping = false; showPageContent();
                  
                  if (currentPage === totalPhysicalPages && !isHeartFormed) {
                      isHeartFormed = true; setTimeout(startFinale, 1000);
                  }
              }, 400); 
          }
      }
  }

  function prevPage() {
      if (currentPage > 0 && !isFlipping) {
          isFlipping = true; currentPage--;
          const pageToFlip = document.querySelector(`.page[data-page="${currentPage}"]`);
          pageToFlip.classList.add('flipping');
          setTimeout(() => {
              pageToFlip.classList.remove('flipping'); pageToFlip.classList.remove('flipped');
              isFlipping = false; showPageContent();
          }, 400);
      }
  }

  function typewriterEffect(element, text, speed = 40) {
      return new Promise(resolve => {
          element.innerHTML = ''; let i = 0;
          function type() {
              if (i < text.length) { element.innerHTML += text.charAt(i); i++; typewriterTimeout = setTimeout(type, speed); } 
              else resolve();
          }
          type();
      });
  }

  async function showPageContent() {
      if (typewriterTimeout) clearTimeout(typewriterTimeout);
      if (isHeartFormed) return; 
      
      let logicIdx = currentPage === 0 ? 0 : 
          (document.querySelector(`.page[data-page="${currentPage}"]`)?.classList.contains('flipped') ? currentPage * 2 + 1 : currentPage * 2);
      
      const text = pagesConfig[logicIdx]?.content;
      
      if (text && text.trim() !== '') {
          contentDisplay.classList.add('show'); contentDisplay.classList.remove('hide');
          await typewriterEffect(contentText, text, 30);
      } else {
          contentDisplay.classList.remove('show'); contentDisplay.classList.add('hide');
      }
  }

  function startFinale() {
      bookContainer.classList.add('hide');
      contentDisplay.classList.add('hide');

      setTimeout(() => {
          bookContainer.style.display = 'none';
          bdayBannerFinale.classList.remove('hide'); 
          shootCSSConfetti(); 
          spawnHeartPhotosCentered(); 
      }, 800);
  }

  function shootCSSConfetti() {
      const colors = ['#ff69b4', '#ff1493', '#ffd700', '#00ced1', '#ff4500', '#7cfc00'];
      for (let i = 0; i < 150; i++) {
          const conf = document.createElement('div'); conf.className = 'css-confetti';
          conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          conf.style.left = Math.random() * 100 + 'vw';
          conf.style.width = (Math.random() * 8 + 5) + 'px'; conf.style.height = (Math.random() * 15 + 5) + 'px';
          conf.style.animationDuration = (Math.random() * 3 + 2) + 's'; conf.style.animationDelay = Math.random() * 2 + 's';
          document.body.appendChild(conf); setTimeout(() => conf.remove(), 5000);
      }
  }

  function spawnHeartPhotosCentered() {
      const maxPhotos = 30; let currentIndex = 0;
      function spawnNext() {
          if (currentIndex < maxPhotos) {
              createHeartPhoto(currentIndex, maxPhotos); currentIndex++;
              setTimeout(() => requestAnimationFrame(spawnNext), 70); 
          }
      }
      spawnNext();
  }

  function createHeartPhoto(idx, total) {
      const photo = document.createElement('img');
      photo.src = photoUrls[idx % photoUrls.length];
      photo.className = 'magic-photo';

      const cX = window.innerWidth * 0.5; const cY = window.innerHeight * 0.5;
      const t = (idx / total) * 2 * Math.PI;
      const scale = (window.innerHeight <= 500 && window.innerWidth > window.innerHeight) ? 8 : 16;
      const targetX = scale * 16 * Math.pow(Math.sin(t), 3);
      const targetY = -scale * (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

      photo.style.left = cX + 'px'; photo.style.top = cY + 'px'; document.body.appendChild(photo);

      requestAnimationFrame(() => {
          setTimeout(() => {
              photo.style.opacity = '1'; const rotation = Math.random() * 40 - 20; 
              photo.style.transform = `translate(-50%, -50%) scale(1) rotate(${rotation}deg)`;
              photo.style.left = (cX + targetX) + 'px'; photo.style.top = (cY + targetY) + 'px';
              setTimeout(() => photo.classList.add('formed'), 1500);
          }, 50);
      });
  }

  let startX = 0, startY = 0, startTime = 0, isDragging = false;
  function handleDragStart(x, y) { if (isFlipping || isHeartFormed) return; startX = x; startY = y; startTime = Date.now(); isDragging = true; }
  function handleDragEnd(endX, endY) {
      if (!isDragging || isFlipping || isHeartFormed) return;
      isDragging = false; const deltaX = endX - startX, deltaTime = Date.now() - startTime;
      if (Math.abs(deltaX) > 50 || (Math.abs(deltaX) / deltaTime > 0.5 && Math.abs(deltaX) > 30)) { deltaX < 0 ? nextPage() : prevPage(); }
  }

  book.addEventListener('touchstart', (e) => handleDragStart(e.touches[0].clientX, e.touches[0].clientY), { passive: false });
  book.addEventListener('touchend', (e) => handleDragEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY), { passive: false });
  book.addEventListener('mousedown', (e) => { e.preventDefault(); handleDragStart(e.clientX, e.clientY); });
  document.addEventListener('mouseup', (e) => handleDragEnd(e.clientX, e.clientY));
  document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextPage(); } 
      else if (e.key === 'ArrowLeft') { e.preventDefault(); prevPage(); }
  });
  book.addEventListener('contextmenu', e => e.preventDefault());
